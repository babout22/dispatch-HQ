name: Deploy to Netlify`non:`n  push:`n    branches: [master]`n    paths:`n      - dispatch-hq.html`njobs:`n  deploy:`n    runs-on: ubuntu-latest`n    steps:`n      - uses: actions/checkout@v4`n      - run: npm install -g netlify-cli`n      - run: netlify deploy --prod --dir . --auth "${{ secrets.NETLIFY_AUTH_TOKEN }}" --site "${{ secrets.NETLIFY_SITE_ID }}"
