redirectsOrigin = "config"
plugins = []

[functions]

[functions."*"]

[build]
publish = "C:\\dispatch-hq"
publishOrigin = "config"

[build.environment]

[build.processing]

[build.processing.css]

[build.processing.html]

[build.processing.images]

[build.processing.js]

[build.services]

[[headers]]
for = "/dispatch-hq.html"

[headers.values]
Cross-Origin-Opener-Policy = "same-origin"
Cross-Origin-Embedder-Policy = "require-corp"
Cross-Origin-Resource-Policy = "cross-origin"
Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://maps.googleapis.com https://maps.gstatic.com https://script.google.com; connect-src 'self' https://script.google.com https://cdn.jsdelivr.net https://huggingface.co https://*.huggingface.co wss:; worker-src blob:; img-src 'self' data: https://maps.gstatic.com https://maps.googleapis.com;"

[[headers]]
for = "/index.html"

[headers.values]
Cross-Origin-Opener-Policy = "same-origin"
Cross-Origin-Embedder-Policy = "require-corp"
Cross-Origin-Resource-Policy = "cross-origin"
Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://maps.googleapis.com https://maps.gstatic.com https://script.google.com; connect-src 'self' https://script.google.com https://cdn.jsdelivr.net https://huggingface.co https://*.huggingface.co wss:; worker-src blob:; img-src 'self' data: https://maps.gstatic.com https://maps.googleapis.com;"

[[headers]]
for = "/*"

[headers.values]
X-Frame-Options = "SAMEORIGIN"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "microphone=(self), camera=(), geolocation=()"

[[redirects]]
from = "/*"
to = "/dispatch-hq.html"
status = 200.0
force = false

[redirects.query]

[redirects.conditions]

[redirects.headers]