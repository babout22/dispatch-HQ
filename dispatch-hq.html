    /* ── Fonts: Gmarket Sans (headings/display) · JetBrains Mono (data) · Noto Sans KR (body) ── */

    /* ── Midnight Seoul Design Tokens ── */

      --amber-border: rgba(240,165,0,0.3);

      background: repeating-linear-gradient(

    body::after {
      content: '';

        linear-gradient(90deg, rgba(76,175,106,0.03) 1px, transparent 1px);

    @media (max-width: 480px) {
      .booking-card-grid { grid-template-columns: 1fr 1fr; }

    /* ── Mobile ── */

        bottom: 0; left: 0; right: 0;
        height: calc(44px + env(safe-area-inset-bottom));
        padding-bottom: env(safe-area-inset-bottom);
        background: rgba(6,14,6,0.98);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);

        padding-left: 12px !important;

      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

  if (s.includes("NEWARK") || s.includes("EWR")) return "EWR";
  if (s.includes("FLUSHING")) return "Flushing";
  if (s.includes("MHT") || s.includes("MANHATTAN") || s.includes("MIDTOWN") || s.includes("DOWNTOWN") || s.includes("NEW YORK CITY") || s.includes("NYC") || s.includes("TIMES SQUARE") || s.includes("PENN STATION") || s.includes("GRAND CENTRAL")) {
